<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f5f5f5;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #4caf50;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #43a047;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .success {
            color: green;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Enter a new password</h1>

        <input type="password" id="password" placeholder="New Password" required />
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required />

        <button onclick="resetPassword()">Reset Password</button>

        <div id="message"></div>
    </div>

    <script>
        function getTokenFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get("token");
        }

        async function resetPassword() {
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const messageDiv = document.getElementById("message");
            const token = getTokenFromURL();

            messageDiv.innerHTML = "";

            if (!password || !confirmPassword) {
                messageDiv.innerHTML = '<div class="error">All fields are required.</div>';
                return;
            }

            if (password !== confirmPassword) {
                messageDiv.innerHTML = '<div class="error">Passwords do not match.</div>';
                return;
            }

            if (!token) {
                messageDiv.innerHTML = '<div class="error">Invalid or missing token.</div>';
                return;
            }

            try {
                const response = await fetch("/api/accounts/reset-password/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        token: token,
                        new_password: password
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Reset failed.");
                }

                messageDiv.innerHTML = '<div class="success">Password successfully reset!</div>';

            } catch (error) {
                messageDiv.innerHTML = `<div class="error">${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
